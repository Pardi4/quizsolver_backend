<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizSolver Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/site.css">
  <style>
    body{background:var(--bg);padding:0}
    .admin-wrap{max-width:1400px;margin:0 auto;padding:24px}
    .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
    .admin-title{font-size:1.5rem;font-weight:800;display:flex;align-items:center;gap:10px}
    .admin-title span{font-size:1.8rem}
    .admin-actions{display:flex;gap:10px;flex-wrap:wrap}

    .login-panel{max-width:400px;margin:100px auto;padding:36px}
    .login-panel h2{font-size:1.3rem;font-weight:700;margin-bottom:20px;text-align:center}

    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:32px}
    .stat-card{padding:20px;text-align:center;border-radius:var(--radius-sm)}
    .stat-card .stat-val{font-size:1.6rem;font-weight:800;margin-bottom:4px}
    .stat-card .stat-lbl{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
    .stat-card.revenue .stat-val{color:var(--success)}

    .tabs{display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap}
    .tab{padding:10px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.85rem;font-weight:600;color:var(--text-muted);transition:all .2s;font-family:var(--font)}
    .tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .tab:hover:not(.active){border-color:var(--border-hover);color:var(--text)}
    .tab-panel{display:none}.tab-panel.active{display:block}

    .search-bar{display:flex;gap:10px;margin-bottom:20px}
    .search-bar input{flex:1;padding:10px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.85rem;font-family:var(--font);outline:none}
    .search-bar input:focus{border-color:var(--primary-light)}

    .user-table{width:100%;border-collapse:collapse;font-size:.85rem}
    .user-table th{text-align:left;padding:12px;color:var(--text-muted);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
    .user-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
    .user-table tr:hover td{background:var(--bg-card-hover)}
    .user-table .email{font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-table .banned{color:var(--error)}

    .quick-btns{display:flex;gap:4px;flex-wrap:wrap}
    .quick-btn{padding:4px 10px;font-size:.7rem;font-weight:600;border:none;border-radius:4px;cursor:pointer;font-family:var(--font);transition:all .15s}
    .quick-btn.grant{background:rgba(34,197,94,0.15);color:var(--success)}
    .quick-btn.grant:hover{background:rgba(34,197,94,0.3)}
    .quick-btn.ban{background:rgba(239,68,68,0.15);color:var(--error)}
    .quick-btn.ban:hover{background:rgba(239,68,68,0.3)}
    .quick-btn.unban{background:rgba(0,212,170,0.15);color:var(--accent)}
    .quick-btn.unban:hover{background:rgba(0,212,170,0.3)}
    .quick-btn.lb{background:rgba(108,61,255,0.15);color:var(--primary-light)}
    .quick-btn.lb:hover{background:rgba(108,61,255,0.3)}
    .quick-btn.del{background:rgba(239,68,68,0.1);color:#f87171}
    .quick-btn.del:hover{background:rgba(239,68,68,0.25)}

    .purchase-table{width:100%;border-collapse:collapse;font-size:.85rem}
    .purchase-table th{text-align:left;padding:10px;color:var(--text-muted);font-size:.75rem;text-transform:uppercase;border-bottom:1px solid var(--border)}
    .purchase-table td{padding:8px 10px;border-bottom:1px solid var(--border)}

    .bug-item{padding:14px;margin-bottom:10px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border)}
    .bug-item .bug-meta{font-size:.75rem;color:var(--text-muted);margin-bottom:6px}
    .bug-item .bug-url{font-weight:600;font-size:.85rem;color:var(--primary-light);word-break:break-all}
    .bug-item .bug-desc{font-size:.85rem;color:var(--text-muted);margin-top:6px}

    .cache-stat{display:flex;align-items:center;gap:16px;margin-bottom:16px}
    .cache-stat .cache-num{font-size:2rem;font-weight:800}
    .cache-hit-item{padding:10px;margin-bottom:8px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);font-size:.85rem;display:flex;justify-content:space-between;align-items:center}
    .hit-count{font-weight:700;color:var(--accent)}

    .health-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
    .health-item{padding:16px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);text-align:center}
    .health-item .h-label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px}
    .health-item .h-value{font-size:1.1rem;font-weight:700}
    .health-ok{color:var(--success)}
    .health-warn{color:var(--warning)}

    .pagination{display:flex;gap:8px;margin-top:16px;justify-content:center}
    .page-btn{padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;color:var(--text);cursor:pointer;font-family:var(--font);font-size:.8rem}
    .page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .page-btn:hover:not(.active){border-color:var(--primary-light)}

    .table-wrap{overflow-x:auto}
    .empty-msg{padding:40px;text-align:center;color:var(--text-muted)}
    @media(max-width:768px){.admin-wrap{padding:12px}.stats-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div id="admin-login" class="login-panel glass-card">
      <h2>🔐 Admin Login</h2>
      <div class="form-group"><input type="email" id="admin-email" placeholder="Email" class="form-input"></div>
      <div class="form-group"><input type="password" id="admin-password" placeholder="Password" class="form-input"></div>
      <div class="form-error hidden" id="admin-login-error"></div>
      <button class="btn-primary btn-block" id="admin-login-btn" style="margin-top:12px">Sign In</button>
    </div>

    <div id="admin-panel" class="hidden">
      <div class="admin-header">
        <div class="admin-title"><span>🛡️</span> QuizSolver Admin</div>
        <div class="admin-actions">
          <button class="btn-ghost" id="refresh-btn">🔄 Refresh</button>
          <button class="btn-ghost" id="admin-logout-btn">🚪 Logout</button>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="users">👥 Users</button>
        <button class="tab" data-tab="purchases">💳 Purchases</button>
        <button class="tab" data-tab="bugs">🐛 Bug Reports</button>
        <button class="tab" data-tab="cache">💾 Cache</button>
        <button class="tab" data-tab="leaderboard">🏆 Leaderboard</button>
        <button class="tab" data-tab="health">🏥 System</button>
      </div>

      <div class="tab-panel active" id="tab-users">
        <div class="search-bar">
          <input type="text" id="user-search" placeholder="Search users by email or name...">
          <button class="btn-primary btn-sm" id="search-btn">Search</button>
        </div>
        <div class="table-wrap"><table class="user-table"><thead><tr>
          <th>Email</th><th>Name</th><th>Role</th><th>Credits</th><th>Questions</th><th>Streak</th><th>Status</th><th>Actions</th>
        </tr></thead><tbody id="users-tbody"></tbody></table></div>
        <div class="pagination" id="users-pagination"></div>
      </div>

      <div class="tab-panel" id="tab-purchases">
        <div class="table-wrap"><table class="purchase-table"><thead><tr>
          <th>User</th><th>Pack</th><th>Credits</th><th>Price</th><th>Provider</th><th>Reason</th><th>Date</th>
        </tr></thead><tbody id="purchases-tbody"></tbody></table></div>
      </div>

      <div class="tab-panel" id="tab-bugs">
        <div id="bugs-list"><div class="empty-msg">Loading...</div></div>
      </div>

      <div class="tab-panel" id="tab-cache">
        <div class="cache-stat">
          <div class="cache-num" id="cache-total">0</div>
          <div><div style="font-weight:600">Total Cached</div><div style="font-size:.8rem;color:var(--text-muted)">Answers in database</div></div>
          <button class="btn-primary btn-sm" id="clear-cache-btn" style="margin-left:auto">🗑️ Clear All</button>
        </div>
        <h4 style="margin-bottom:12px;font-size:.9rem">Top Hits</h4>
        <div id="cache-hits"></div>
      </div>

      <div class="tab-panel" id="tab-leaderboard">
        <div id="admin-leaderboard"></div>
      </div>

      <div class="tab-panel" id="tab-health">
        <div class="health-grid" id="health-grid"></div>
      </div>
    </div>
  </div>

  <script src="/admin-app.js"></script>
</body>
</html>
