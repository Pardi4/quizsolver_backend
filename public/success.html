<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — QuizSolver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/site.css">
  <style>
    .success-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .success-card{max-width:480px;width:100%;padding:48px;text-align:center}
    .success-icon{font-size:4rem;margin-bottom:20px;animation:bounce-in .6s ease}
    @keyframes bounce-in{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
    .success-title{font-size:1.8rem;font-weight:800;margin-bottom:12px}
    .success-text{color:var(--text-muted);margin-bottom:32px;line-height:1.6}
    .success-actions{display:flex;flex-direction:column;gap:12px}
  </style>
</head>
<body>
  <div id="particles-bg"></div>
  <div class="success-page">
    <div class="success-card glass-card">
      <div class="success-icon">🎉</div>
      <h1 class="success-title">Payment Successful!</h1>
      <p class="success-text">
        Your credits have been added to your account.
        Open the QuizSolver extension or go to your dashboard to start solving quizzes.
      </p>
      <div class="success-actions">
        <a href="/" class="btn-primary btn-block">Go to Dashboard</a>
        <a href="/" class="btn-outline btn-block">Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
