<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Checkout — QuizSolver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #09090b;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      background: #7c5cfc;
      top: -200px; left: -150px;
      animation: blob1 20s ease-in-out infinite alternate;
    }
    body::after {
      width: 500px; height: 500px;
      background: #a855f7;
      bottom: -200px; right: -100px;
      animation: blob2 18s ease-in-out infinite alternate;
    }
    @keyframes blob1 { to { transform: translate(120px, 80px) scale(1.1); } }
    @keyframes blob2 { to { transform: translate(-100px, -60px) scale(0.9); } }

    .checkout-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124, 92, 252, 0.12);
      color: #a78bfa;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid rgba(124, 92, 252, 0.2);
      margin-bottom: 20px;
    }
    .badge svg { width: 14px; height: 14px; }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #f0f0f5 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #71717a;
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* Order summary */
    .order-summary {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    .order-row + .order-row { margin-top: 12px; }
    .order-row .label { color: #a1a1aa; }
    .order-row .value { font-weight: 600; color: #f0f0f5; }
    .order-row.total {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .order-row.total .value {
      font-size: 22px;
      background: linear-gradient(135deg, #7c5cfc, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: #f0f0f5;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input::placeholder { color: #52525b; }
    .form-group input:focus {
      border-color: rgba(124, 92, 252, 0.5);
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.12);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .pay-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #7c5cfc 0%, #9333ea 100%);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 16px rgba(124, 92, 252, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 6px;
    }
    .pay-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(124, 92, 252, 0.4);
    }
    .pay-btn:active:not(:disabled) { transform: translateY(0); }
    .pay-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .pay-btn .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .pay-btn.loading .spinner { display: block; }
    .pay-btn.loading .btn-text { display: none; }
    .pay-btn .btn-text { display: flex; align-items: center; gap: 8px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .secure-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 12px;
      color: #52525b;
    }
    .secure-note svg { width: 14px; height: 14px; color: #71717a; }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      font-size: 13px;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      display: none;
    }
    .error-msg.visible { display: block; }

    @media (max-width: 500px) {
      .checkout-card { padding: 28px 22px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="checkout-card">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Demo Mode
    </div>

    <h1>Demo Checkout</h1>
    <p class="subtitle">This is a test payment — no real charges will be made.</p>

    <div class="order-summary">
      <div class="order-row">
        <span class="label">Pack</span>
        <span class="value" id="packName">—</span>
      </div>
      <div class="order-row">
        <span class="label">Credits</span>
        <span class="value" id="creditsAmount">—</span>
      </div>
      <div class="order-row total">
        <span class="label">Total</span>
        <span class="value" id="priceDisplay">$0.00</span>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="checkoutForm" autocomplete="off">
      <div class="form-group">
        <label for="cardNumber">Card Number</label>
        <input type="text" id="cardNumber" placeholder="4242 4242 4242 4242" maxlength="19" inputmode="numeric">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="expiry">Expiry</label>
          <input type="text" id="expiry" placeholder="12 / 28" maxlength="7" inputmode="numeric">
        </div>
        <div class="form-group">
          <label for="cvv">CVV</label>
          <input type="text" id="cvv" placeholder="123" maxlength="4" inputmode="numeric">
        </div>
      </div>

      <button type="submit" class="pay-btn" id="payBtn">
        <div class="spinner"></div>
        <span class="btn-text">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Pay Now
        </span>
      </button>
    </form>

    <div class="secure-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Demo environment — no real payment processed
    </div>
  </div>

  <script>
    (function () {
      // Read URL params
      const params = new URLSearchParams(window.location.search);
      const pack = params.get('pack') || 'starter';
      const credits = params.get('credits') || '100';
      const price = params.get('price') || '1.99';
      const userId = params.get('userId') || '';
      const email = params.get('email') || '';

      // Populate order summary
      const packLabels = { starter: 'Starter', popular: 'Popular', pro: 'Pro' };
      document.getElementById('packName').textContent = packLabels[pack] || pack;
      document.getElementById('creditsAmount').textContent = Number(credits).toLocaleString();
      document.getElementById('priceDisplay').textContent = '$' + parseFloat(price).toFixed(2);

      // Card number formatting (cosmetic)
      const cardInput = document.getElementById('cardNumber');
      cardInput.addEventListener('input', function () {
        let v = this.value.replace(/\D/g, '').substring(0, 16);
        this.value = v.replace(/(\d{4})(?=\d)/g, '$1 ');
      });

      // Expiry formatting (cosmetic)
      const expiryInput = document.getElementById('expiry');
      expiryInput.addEventListener('input', function () {
        let v = this.value.replace(/\D/g, '').substring(0, 4);
        if (v.length >= 3) v = v.substring(0, 2) + ' / ' + v.substring(2);
        this.value = v;
      });

      // CVV — digits only
      const cvvInput = document.getElementById('cvv');
      cvvInput.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '').substring(0, 4);
      });

      // Form submission
      const form = document.getElementById('checkoutForm');
      const payBtn = document.getElementById('payBtn');
      const errorMsg = document.getElementById('errorMsg');

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
      }
      function hideError() {
        errorMsg.classList.remove('visible');
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        hideError();

        if (!userId) {
          showError('Missing user ID. Please go back and try again.');
          return;
        }

        // Disable button, show spinner
        payBtn.disabled = true;
        payBtn.classList.add('loading');

        // Simulate processing delay
        setTimeout(function () {
          fetch('/api/webhook/demo-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: userId, pack: pack, credits: credits })
          })
            .then(function (res) { return res.json(); })
            .then(function (data) {
              if (data.success) {
                window.location.href = '/success';
              } else {
                payBtn.disabled = false;
                payBtn.classList.remove('loading');
                showError(data.error || 'Payment failed. Please try again.');
              }
            })
            .catch(function () {
              payBtn.disabled = false;
              payBtn.classList.remove('loading');
              showError('Network error. Please check your connection and try again.');
            });
        }, 1500);
      });
    })();
  </script>
</body>
</html>
