<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">QuizSolver AI quiz assistant preview</title>
  <desc id="desc">Dark interface preview with a quiz question, selected answer, and QuizSolver branding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080818"/>
      <stop offset="0.55" stop-color="#11112a"/>
      <stop offset="1" stop-color="#071f24"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#00d4aa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="58" width="1060" height="514" rx="28" fill="#ffffff" opacity="0.035" stroke="#ffffff" stroke-opacity="0.08"/>
  <g transform="translate(110 112)">
    <circle cx="30" cy="30" r="30" fill="url(#brand)"/>
    <text x="76" y="39" fill="#f5f5ff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">QuizSolver</text>
    <text x="0" y="132" fill="#f5f5ff" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="900">AI quiz assistant</text>
    <text x="0" y="184" fill="#a9aac4" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500">Practice, answer, and understand quizzes faster.</text>
    <g transform="translate(0 250)">
      <rect width="190" height="52" rx="10" fill="#6c3dff"/>
      <text x="28" y="34" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Get started</text>
      <rect x="212" width="230" height="52" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="238" y="34" fill="#f5f5ff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Testportal support</text>
    </g>
  </g>
  <g transform="translate(710 112)" filter="url(#shadow)">
    <rect width="350" height="390" rx="20" fill="#101027" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="28" y="28" width="126" height="30" rx="15" fill="#6c3dff" opacity="0.22"/>
    <text x="44" y="49" fill="#b7a7ff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Question 3/10</text>
    <text x="28" y="104" fill="#f5f5ff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Capital of France?</text>
    <g font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">
      <rect x="28" y="140" width="294" height="48" rx="10" fill="#ffffff" opacity="0.035" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="50" y="171" fill="#b8b8ce">Berlin</text>
      <rect x="28" y="202" width="294" height="48" rx="10" fill="#ffffff" opacity="0.035" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="50" y="233" fill="#b8b8ce">Madrid</text>
      <rect x="28" y="264" width="294" height="50" rx="10" fill="#22c55e" opacity="0.16" stroke="#22c55e" stroke-opacity="0.75"/>
      <text x="50" y="296" fill="#5cf09a">Paris</text>
      <text x="286" y="296" fill="#5cf09a">✓</text>
      <rect x="28" y="328" width="294" height="48" rx="10" fill="#ffffff" opacity="0.035" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="50" y="359" fill="#b8b8ce">Rome</text>
    </g>
  </g>
</svg>
